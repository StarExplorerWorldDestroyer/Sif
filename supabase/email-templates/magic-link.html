<!--
  Sif — Magic link email template.
  Paste into Supabase: Authentication → Emails → Templates → "Magic Link".
  Suggested subject: Your Sif sign-in link
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#000000;margin:0;padding:32px 0;">
  <tr>
    <td align="center" style="padding:0 16px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background:#0F0F0F;border:1px solid #2D2D2D;border-radius:16px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
        <tr>
          <td style="padding:32px 32px 0;">
            <div style="font-size:22px;font-weight:700;color:#FF5733;letter-spacing:0.5px;">Sif</div>
          </td>
        </tr>
        <tr>
          <td style="padding:20px 32px 0;">
            <h1 style="margin:0;font-size:20px;font-weight:700;color:#FFFFFF;">Your sign-in link</h1>
          </td>
        </tr>
        <tr>
          <td style="padding:12px 32px 0;">
            <p style="margin:0;font-size:15px;line-height:22px;color:#9BA1A6;">Tap below to sign in to Sif. This link expires soon and can only be used once.</p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px 0;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#FF5733;color:#000000;text-decoration:none;font-weight:600;font-size:15px;padding:13px 26px;border-radius:999px;">Sign in to Sif</a>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px 0;">
            <p style="margin:0;font-size:13px;line-height:20px;color:#6B6B6B;">Or paste this link into your browser:</p>
            <p style="margin:6px 0 0;font-size:13px;line-height:20px;"><a href="{{ .ConfirmationURL }}" style="color:#FF5733;word-break:break-all;">{{ .ConfirmationURL }}</a></p>
          </td>
        </tr>
        <tr>
          <td style="padding:24px 32px 32px;border-top:1px solid #2D2D2D;">
            <p style="margin:0;font-size:12px;line-height:18px;color:#6B6B6B;">If you didn&rsquo;t try to sign in, you can ignore this email.</p>
          </td>
        </tr>
      </table>
      <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:11px;color:#6B6B6B;padding-top:16px;">Sif · goldensif.com</div>
    </td>
  </tr>
</table>
